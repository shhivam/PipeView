    <!-- Pipe outline -->
    <path
      d="M 24 64 Q 24 46, 40 40 L 88 40 Q 104 46, 104 64 Q 104 82, 88 88 L 40 88 Q 24 82, 24 64 Z"
      fill="#1a1a1a"
      opacity="0.8"
    />

    <!-- Inner bandwidth visualization -->
    <path
      d="M 32 64 L 38 58 L 44 62 L 50 52 L 56 60 L 62 54 L 68 64 L 74 58 L 80 62 L 86 56 L 92 64 L 96 60"
      stroke="#fbbf24"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
