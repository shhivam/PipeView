    />

    <!-- Data points -->
    <circle cx="50" cy="52" r="4" fill="#fbbf24" />
    <circle cx="68" cy="64" r="4" fill="#f59e0b" />
    <circle cx="86" cy="56" r="4" fill="#fbbf24" />

    <!-- Pipe borders -->
    <path
      d="M 40 40 L 88 40 Q 104 46, 104 64 Q 104 82, 88 88 L 40 88 Q 24 82, 24 64 Q 24 46, 40 40 Z"
      stroke="#fbbf24"
      stroke-width="2.5"
